<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard VIP — Entrar</title>
</head>
<body>

<h2>Login</h2>
<form id="loginForm">
<input id="loginEmail" placeholder="Email" required>
<input id="loginPass" type="password" placeholder="Senha" required>
<button type="submit">Entrar</button>
</form>

<h2>Criar Conta</h2>
<form id="signupForm">
<input id="signupName" placeholder="Nome" required>
<input id="signupEmail" placeholder="Email" required>
<input id="signupPass" type="password" placeholder="Senha" required>
<button type="submit">Criar Conta</button>
</form>

<button id="forgotBtn">Esqueci a senha</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  sendPasswordResetEmail,
  updateProfile,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDXh7_Lh_AeLdIJ0LsiViKo5pnRgl7hPAg",
  authDomain: "finaceiro-dcf5a.firebaseapp.com",
  projectId: "finaceiro-dcf5a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// AUTO LOGIN
onAuthStateChanged(auth, (user) => {
  if (user) window.location.href = "/dashboard.html";
});

// LOGIN
document.getElementById("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  try {
    await signInWithEmailAndPassword(
      auth,
      loginEmail.value,
      loginPass.value
    );
    window.location.href = "/dashboard.html";
  } catch (err) {
    alert(err.message);
  }
});

// CADASTRO
document.getElementById("signupForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  try {
    const userCred = await createUserWithEmailAndPassword(
      auth,
      signupEmail.value,
      signupPass.value
    );

    await updateProfile(userCred.user, {
      displayName: signupName.value
    });

    alert("Conta criada com sucesso!");
  } catch (err) {
    alert(err.message);
  }
});

// RECUPERAR SENHA
document.getElementById("forgotBtn").addEventListener("click", async () => {
  if (!loginEmail.value) return alert("Digite o email");

  try {
    await sendPasswordResetEmail(auth, loginEmail.value);
    alert("Email de recuperação enviado!");
  } catch (err) {
    alert(err.message);
  }
});
</script>

</body>
</html>
